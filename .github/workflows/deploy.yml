name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - '*.css'
      - '*.js'
      - 'data/**'
      - 'weekly/**'
      - 'pipeline/templates/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      - id: deploy
        uses: actions/deploy-pages@v5
